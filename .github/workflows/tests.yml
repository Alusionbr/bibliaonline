name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:        # permite que o deploy reutilize este job

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Validate curated data
        run: python scripts/validate_data.py

      - name: Lint Python
        run: ruff check .

      - name: Run test suite
        run: pytest
